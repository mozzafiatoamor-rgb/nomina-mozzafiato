<!DOCTYPE html>
<html lang="es-MX">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0a0f1a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Mozzafiato Payroll">
  <title>Mozzafiato Admin Payroll</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0f1a;
      color: #fff;
      overflow-x: hidden;
    }

    html, body {
      height: 100%;
      width: 100%;
    }

    #app {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      max-width: 480px;
      margin: 0 auto;
      width: 100%;
    }

    /* Layout: Screen base */
    .screen {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .screen-header {
      padding: 16px;
      background: #141d2b;
      border-bottom: 1px solid rgba(0, 184, 148, 0.1);
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 56px;
    }

    .screen-header h1 {
      font-size: 20px;
      font-weight: 600;
    }

    .screen-content {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
    }

    /* Wizard Steps */
    .wizard-step {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .step-indicator {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-bottom: 20px;
    }

    .step-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.2);
      transition: all 0.3s;
    }

    .step-dot.active {
      background: #00b894;
      transform: scale(1.5);
    }

    /* Inputs */
    input[type="text"],
    input[type="email"],
    input[type="date"],
    input[type="time"],
    input[type="number"],
    select,
    textarea {
      width: 100%;
      padding: 12px;
      background: #0a0f1a;
      border: 1px solid rgba(0, 184, 148, 0.3);
      border-radius: 10px;
      color: #fff;
      font-size: 16px;
      font-family: inherit;
    }

    input:focus,
    select:focus,
    textarea:focus {
      outline: none;
      border-color: #00b894;
      box-shadow: 0 0 0 3px rgba(0, 184, 148, 0.1);
    }

    input::placeholder {
      color: rgba(255, 255, 255, 0.5);
    }

    /* Buttons */
    .btn {
      padding: 12px 16px;
      background: #00b894;
      color: #0a0f1a;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(0, 184, 148, 0.3);
    }

    .btn:active {
      transform: translateY(0);
    }

    .btn-secondary {
      background: #1a2333;
      color: #fff;
      border: 1px solid rgba(0, 184, 148, 0.3);
    }

    .btn-secondary:hover {
      background: #232d3d;
    }

    .btn-small {
      padding: 8px 12px;
      font-size: 12px;
    }

    .btn-danger {
      background: #d63031;
      color: #fff;
    }

    .btn-danger:hover {
      background: #e74c3c;
    }

    /* Cards */
    .card {
      background: #141d2b;
      border-radius: 16px;
      padding: 16px;
      border: 1px solid rgba(0, 184, 148, 0.1);
      margin-bottom: 12px;
      transition: all 0.3s;
      cursor: pointer;
    }

    .card:hover {
      border-color: rgba(0, 184, 148, 0.3);
      transform: translateY(-2px);
    }

    .card-title {
      font-weight: 600;
      font-size: 14px;
      margin-bottom: 8px;
      color: #00b894;
    }

    .card-value {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .card-label {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.6);
    }

    /* Badge */
    .badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
    }

    .badge-green {
      background: rgba(0, 184, 148, 0.2);
      color: #00b894;
    }

    .badge-yellow {
      background: rgba(255, 193, 7, 0.2);
      color: #ffc107;
    }

    .badge-red {
      background: rgba(214, 48, 49, 0.2);
      color: #d63031;
    }

    /* PIN Entry */
    .pin-display {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin: 20px 0;
    }

    .pin-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.2);
      border: 2px solid rgba(0, 184, 148, 0.3);
      transition: all 0.2s;
    }

    .pin-dot.filled {
      background: #00b894;
      border-color: #00b894;
      transform: scale(1.2);
    }

    /* Numpad */
    .numpad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin: 20px 0;
    }

    .numpad-btn {
      aspect-ratio: 1;
      border-radius: 50%;
      border: 2px solid rgba(0, 184, 148, 0.3);
      background: transparent;
      color: #fff;
      font-size: 20px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .numpad-btn:hover {
      border-color: #00b894;
      transform: scale(1.05);
    }

    .numpad-btn:active {
      background: rgba(0, 184, 148, 0.2);
      transform: scale(0.95);
    }

    .numpad-btn.backspace {
      grid-column: 2 / 4;
    }

    /* Drawer */
    .drawer-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 998;
      display: none;
    }

    .drawer-overlay.open {
      display: block;
    }

    .drawer {
      position: fixed;
      top: 0;
      left: 0;
      height: 100vh;
      width: 280px;
      background: #141d2b;
      z-index: 999;
      transform: translateX(-100%);
      transition: transform 0.3s;
      display: flex;
      flex-direction: column;
      box-shadow: 2px 0 8px rgba(0, 0, 0, 0.3);
    }

    .drawer.open {
      transform: translateX(0);
    }

    .drawer-header {
      padding: 20px 16px;
      border-bottom: 1px solid rgba(0, 184, 148, 0.1);
      font-size: 18px;
      font-weight: 700;
      color: #00b894;
    }

    .drawer-nav {
      flex: 1;
      overflow-y: auto;
      padding: 12px 0;
    }

    .drawer-link {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      color: #fff;
      text-decoration: none;
      font-size: 14px;
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: all 0.2s;
    }

    .drawer-link:hover {
      background: rgba(0, 184, 148, 0.1);
      border-left-color: #00b894;
    }

    .drawer-link.active {
      background: rgba(0, 184, 148, 0.1);
      border-left-color: #00b894;
      color: #00b894;
    }

    .drawer-footer {
      padding: 16px;
      border-top: 1px solid rgba(0, 184, 148, 0.1);
    }

    /* FAB */
    .fab {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: #00b894;
      color: #0a0f1a;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      z-index: 90;
      box-shadow: 0 4px 12px rgba(0, 184, 148, 0.3);
      transition: all 0.3s;
    }

    .fab:hover {
      transform: scale(1.1);
      box-shadow: 0 6px 16px rgba(0, 184, 148, 0.4);
    }

    /* Modal */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      display: none;
      z-index: 500;
    }

    .modal-overlay.open {
      display: block;
    }

    .modal {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #141d2b;
      border-radius: 20px 20px 0 0;
      max-width: 480px;
      margin: 0 auto;
      width: 100%;
      z-index: 501;
      max-height: 90vh;
      overflow-y: auto;
      transform: translateY(100%);
      transition: transform 0.3s;
      display: flex;
      flex-direction: column;
    }

    .modal.open {
      transform: translateY(0);
    }

    .modal-header {
      padding: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(0, 184, 148, 0.1);
      position: sticky;
      top: 0;
      background: #141d2b;
    }

    .modal-header h2 {
      font-size: 18px;
    }

    .modal-close {
      background: none;
      border: none;
      color: #fff;
      font-size: 24px;
      cursor: pointer;
    }

    .modal-body {
      padding: 16px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .modal-footer {
      padding: 16px;
      display: flex;
      gap: 12px;
      border-top: 1px solid rgba(0, 184, 148, 0.1);
    }

    .modal-footer .btn {
      flex: 1;
    }

    /* Toast */
    .toast {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 12px 20px;
      background: #00b894;
      color: #0a0f1a;
      border-radius: 10px;
      font-size: 14px;
      z-index: 1000;
      box-shadow: 0 4px 12px rgba(0, 184, 148, 0.3);
      max-width: 90%;
      animation: slideDown 0.3s ease;
    }

    .toast.error {
      background: #d63031;
      color: #fff;
    }

    @keyframes slideDown {
      from {
        transform: translateX(-50%) translateY(-20px);
        opacity: 0;
      }
      to {
        transform: translateX(-50%) translateY(0);
        opacity: 1;
      }
    }

    /* Working overlay */
    .working-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(10, 15, 26, 0.8);
      display: none;
      z-index: 999;
      align-items: center;
      justify-content: center;
    }

    .working-overlay.active {
      display: flex;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(0, 184, 148, 0.3);
      border-top-color: #00b894;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* Queue banner */
    .queue-banner {
      background: rgba(255, 193, 7, 0.1);
      border: 1px solid rgba(255, 193, 7, 0.3);
      padding: 12px 16px;
      margin-bottom: 12px;
      border-radius: 10px;
      font-size: 12px;
      color: #ffc107;
      display: none;
    }

    .queue-banner.active {
      display: block;
    }

    /* Grid */
    .grid-2 {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-bottom: 16px;
    }

    /* Tabs for Reportes section */
    .tabs {
      display: flex;
      gap: 0;
      border-bottom: 1px solid rgba(0, 184, 148, 0.1);
      margin-bottom: 16px;
    }

    .tab-btn {
      flex: 1;
      padding: 12px;
      background: none;
      border: none;
      color: rgba(255, 255, 255, 0.6);
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
    }

    .tab-btn.active {
      color: #00b894;
      border-bottom-color: #00b894;
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    /* List */
    .list-item {
      padding: 12px;
      background: transparent;
      border-bottom: 1px solid rgba(0, 184, 148, 0.1);
      cursor: pointer;
      transition: all 0.2s;
    }

    .list-item:hover {
      background: rgba(0, 184, 148, 0.05);
    }

    .list-item-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .list-item-name {
      font-weight: 600;
      font-size: 14px;
    }

    .list-item-meta {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.6);
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    /* Form group */
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 12px;
    }

    .form-group label {
      font-size: 13px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.8);
    }

    /* Images */
    .photo-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      margin: 8px 0;
    }

    .photo-thumb {
      width: 100%;
      aspect-ratio: 1;
      border-radius: 8px;
      background: #0a0f1a;
      border: 1px solid rgba(0, 184, 148, 0.2);
      object-fit: cover;
    }

    /* Table */
    .table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }

    .table th {
      background: rgba(0, 184, 148, 0.1);
      padding: 8px;
      text-align: left;
      font-weight: 600;
      color: #00b894;
      border-bottom: 1px solid rgba(0, 184, 148, 0.2);
    }

    .table td {
      padding: 8px;
      border-bottom: 1px solid rgba(0, 184, 148, 0.1);
    }

    /* Utility */
    .text-center {
      text-align: center;
    }

    .mt-20 {
      margin-top: 20px;
    }

    .gap-12 {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .flex-row {
      display: flex;
      gap: 12px;
    }

    .flex-row .btn {
      flex: 1;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <div class="drawer-overlay" id="drawerOverlay"></div>
  <div class="drawer" id="drawer"></div>
  <button class="fab" id="fab" data-action="toggle-drawer" style="display: none;">☰</button>
  <div class="modal-overlay" id="modalOverlay"></div>
  <div class="modal" id="modal"></div>
  <div class="working-overlay" id="workingOverlay">
    <div class="spinner"></div>
  </div>

  <script>
    // State machine
    var S = {
      screen: 'setup',
      setupStep: 1,
      tab: 'dashboard',
      subTab: 'asistencia',
      reportTab: 'asistencia',
      modalOpen: false,
      drawerOpen: false,
      sheetId: localStorage.getItem('mz_sheetId') || '',
      apiKey: localStorage.getItem('mz_apiKey') || '',
      scriptUrl: localStorage.getItem('mz_scriptUrl') || '',
      username: '',
      userId: null,
      employees: [],
      attendance: [],
      loans: [],
      deductions: [],
      payrolls: [],
      adminUsers: [],
      selectedDate: todayISO(),
      selectedPayrollPeriod: null,
      modalData: {},
      queue: JSON.parse(localStorage.getItem('mz_queue') || '[]')
    };

    // Initialize if config exists
    if (S.sheetId && S.apiKey && S.scriptUrl) {
      S.screen = 'login';
    }

    // Helpers
    function todayISO() {
      var d = new Date();
      return d.toISOString().split('T')[0];
    }

    function normDate(d) {
      if (!d) return '';
      if (typeof d === 'string') {
        if (d.includes('/')) {
          var p = d.split('/');
          return [p[2], p[1], p[0]].join('-');
        }
        return d.split('T')[0];
      }
      var date = new Date(d);
      return date.toISOString().split('T')[0];
    }

    // Sheets API - READ
    function sheetsRead(range) {
      return fetch('https://sheets.googleapis.com/v4/spreadsheets/' + S.sheetId + '/values/' + encodeURIComponent(range) + '?key=' + S.apiKey, {
        cache: 'no-store'
      })
        .then(function(r) { return r.json(); })
        .then(function(d) { return d.values || []; })
        .catch(function(e) {
          console.error('Read error:', e);
          return [];
        });
    }

    // Apps Script - WRITE
    function scriptCall(action, payload) {
      return fetch(S.scriptUrl, {
        method: 'POST',
        body: JSON.stringify(Object.assign({ action: action }, payload))
      })
        .then(function(r) { return r.json(); })
        .catch(function(e) {
          console.error('Script error:', e);
          throw e;
        });
    }

    // Toast
    function toast(msg, type) {
      if (!type) type = 'success';
      var el = document.createElement('div');
      el.className = 'toast ' + (type === 'error' ? 'error' : '');
      el.textContent = msg;
      document.body.appendChild(el);
      setTimeout(function() {
        el.remove();
      }, 2500);
    }

    // Working overlay
    function setWorking(active) {
      document.getElementById('workingOverlay').classList.toggle('active', active);
    }

    // Queue management
    function queueAction(action, payload) {
      S.queue.push({ action: action, payload: payload, timestamp: Date.now() });
      saveQueue();
      updateQueueBanner();
    }

    function saveQueue() {
      localStorage.setItem('mz_queue', JSON.stringify(S.queue));
    }

    function updateQueueBanner() {
      var banner = document.querySelector('.queue-banner');
      if (banner) {
        banner.classList.toggle('active', S.queue.length > 0);
        if (S.queue.length > 0) {
          banner.textContent = 'Pendiente: ' + S.queue.length + ' accion(es). Procesando...';
        }
      }
    }

    function processQueue() {
      if (S.queue.length === 0) return;
      var item = S.queue[0];
      scriptCall(item.action, item.payload)
        .then(function() {
          S.queue.shift();
          saveQueue();
          updateQueueBanner();
          processQueue();
        })
        .catch(function() {
          // Network error - retry later
        });
    }

    setInterval(processQueue, 5000);

    // Render functions
    function renderSetup() {
      var dots = [1, 2, 3].map(function(i) {
        return '<div class="step-dot ' + (i === S.setupStep ? 'active' : '') + '"></div>';
      }).join('');

      var content = '';
      if (S.setupStep === 1) {
        content = '<div class="wizard-step"><h2 style="font-size: 18px; margin-bottom: 8px;">Paso 1: Sheet ID</h2><p style="font-size: 13px; color: rgba(255,255,255,0.6); margin-bottom: 16px;">Copia el ID de tu Google Sheet desde la URL (ej: 1a2b3c4d...)</p><input type="text" id="setupInput" placeholder="1a2b3c4d..." value="' + S.sheetId + '"></div>';
      } else if (S.setupStep === 2) {
        content = '<div class="wizard-step"><h2 style="font-size: 18px; margin-bottom: 8px;">Paso 2: API Key</h2><p style="font-size: 13px; color: rgba(255,255,255,0.6); margin-bottom: 16px;">Copia tu API key de Google Cloud (Sheets API v4)</p><input type="text" id="setupInput" placeholder="AIzaSy..." value="' + S.apiKey + '"></div>';
      } else {
        content = '<div class="wizard-step"><h2 style="font-size: 18px; margin-bottom: 8px;">Paso 3: Script URL</h2><p style="font-size: 13px; color: rgba(255,255,255,0.6); margin-bottom: 16px;">URL del Apps Script para escritura de datos</p><input type="text" id="setupInput" placeholder="https://script.google.com/..." value="' + S.scriptUrl + '"></div>';
      }

      return '<div class="screen"><div class="screen-header"><h1>Configuración</h1></div><div class="screen-content"><div class="step-indicator">' + dots + '</div>' + content + '<div style="flex: 1;"></div><div style="display: flex; gap: 12px;">' + (S.setupStep > 1 ? '<button class="btn btn-secondary" data-action="setup-back">← Atrás</button>' : '<div></div>') + '<button class="btn" data-action="setup-next" style="flex: 1;">' + (S.setupStep === 3 ? 'Finalizar' : 'Siguiente →') + '</button></div></div></div>';
    }

    function renderLogin() {
      var pinLength = S.modalData.pinLength || 0;
      var pinDisplay = [1, 2, 3, 4, 5, 6].map(function(i) {
        return '<div class="pin-dot ' + (i <= pinLength ? 'filled' : '') + '"></div>';
      }).join('');

      var numpad = '<div class="numpad">' +
        [1, 2, 3, 4, 5, 6, 7, 8, 9].map(function(n) {
          return '<button class="numpad-btn" data-action="numpad-digit" data-digit="' + n + '">' + n + '</button>';
        }).join('') +
        '<button class="numpad-btn" data-action="numpad-digit" data-digit="0">0</button>' +
        '<button class="numpad-btn backspace" data-action="numpad-backspace">⌫</button>' +
        '</div>';

      return '<div class="screen"><div class="screen-header"><h1>Mozzafiato Login</h1></div><div class="screen-content"><input type="text" id="usernameInput" placeholder="Usuario" value="' + S.username + '"><div class="text-center" style="margin: 20px 0;"><p style="font-size: 13px; color: rgba(255,255,255,0.6); margin-bottom: 12px;">PIN de 6 dígitos</p><div class="pin-display">' + pinDisplay + '</div></div>' + numpad + '<div style="flex: 1;"></div></div></div>';
    }

    function renderMain() {
      var header = '<div class="screen-header"><h1>Mozzafiato Admin</h1><span style="font-size: 12px; color: rgba(255,255,255,0.6);">' + S.username + '</span></div>';

      var content = '';

      if (S.tab === 'dashboard') {
        var now = new Date();
        var dateKey = now.toISOString().split('T')[0];
        var todayAttendance = S.attendance.filter(function(a) { return normDate(a[3]) === dateKey; });
        var presentes = todayAttendance.filter(function(a) { return a[13] === 'normal' || !a[13]; }).length;

    function render() {
      var app = document.getElementById('app');
      if (S.screen === 'setup') {
        app.innerHTML = renderSetup();
      } else if (S.screen === 'login') {
        app.innerHTML = renderLogin();
      } else {
        app.innerHTML = renderMain();
        document.getElementById('fab').style.display = 'flex';
        document.getElementById('drawer').innerHTML = renderDrawer();
        updateQueueBanner();

        // Bind date input
        var dateInput = document.getElementById('attendanceDateInput');
        if (dateInput) {
          dateInput.addEventListener('change', function(e) {
            S.selectedDate = e.target.value;
            render();
          });
        }
      }
    }

    // Event delegation
    document.addEventListener('click', function(e) {
      var action = e.target.getAttribute('data-action');
      if (!action) return;

      switch (action) {
        // Setup
        case 'setup-next': {
          var input = document.getElementById('setupInput');
          var val = input.value.trim();
          if (!val) return toast('Campo requerido', 'error');

          if (S.setupStep === 1) S.sheetId = val;
          else if (S.setupStep === 2) S.apiKey = val;
          else if (S.setupStep === 3) S.scriptUrl = val;

          if (S.setupStep < 3) {
            S.setupStep++;
            render();
          } else {
            localStorage.setItem('mz_sheetId', S.sheetId);
            localStorage.setItem('mz_apiKey', S.apiKey);
            localStorage.setItem('mz_scriptUrl', S.scriptUrl);

            setWorking(true);
            sheetsRead('AdminUsers!A2:B50').then(function(data) {
              setWorking(false);
              if (data.length > 0) {
                S.adminUsers = data;
                S.screen = 'login';
                render();
              } else {
                toast('No se pudo conectar. Verifica los datos.', 'error');
              }
            }).catch(function(err) {
              setWorking(false);
              toast('Error de conexión', 'error');
            });
          }
          break;
        }
        case 'setup-back': {
          if (S.setupStep > 1) {
            S.setupStep--;
            render();
          }
          break;
        }

        // Login
        case 'numpad-digit': {
          var digit = e.target.getAttribute('data-digit');
          if (!S.modalData.pin) S.modalData.pin = '';
          if (S.modalData.pin.length < 6) {
            S.modalData.pin += digit;
            S.modalData.pinLength = S.modalData.pin.length;
            render();

            if (S.modalData.pin.length === 6) {
              var username = document.getElementById('usernameInput').value.trim();
              if (!username) return toast('Ingresa usuario', 'error');

              var user = S.adminUsers.find(function(u) { return u[0] === username && u[1] === S.modalData.pin; });
              if (user) {
                S.username = username;
                S.userId = username;
                S.screen = 'main';
                S.tab = 'dashboard';
                S.modalData = {};
                loadInitialData();
              } else {
                toast('Usuario o PIN incorrecto', 'error');
                S.modalData.pin = '';
                S.modalData.pinLength = 0;
                render();
              }
            }
          }
          break;
        }
        case 'numpad-backspace': {
          if (S.modalData.pin) {
            S.modalData.pin = S.modalData.pin.slice(0, -1);
            S.modalData.pinLength = S.modalData.pin.length;
            render();
          }
          break;
        }

        // Main navigation
        case 'toggle-drawer': {
          S.drawerOpen = !S.drawerOpen;
          document.getElementById('drawer').classList.toggle('open', S.drawerOpen);
          document.getElementById('drawerOverlay').classList.toggle('open', S.drawerOpen);
          break;
        }
        case 'switch-tab': {
          var tabAttr = e.target.getAttribute('data-tab') || (e.target.closest('[data-tab]') ? e.target.closest('[data-tab]').getAttribute('data-tab') : null);
          if (tabAttr) {
            S.tab = tabAttr;
            S.drawerOpen = false;
            document.getElementById('drawer').classList.remove('open');
            document.getElementById('drawerOverlay').classList.remove('open');
            render();
          }
          break;
        }
        case 'set-report-tab': {
          var rtab = e.target.getAttribute('data-tab');
          if (rtab) {
            S.reportTab = rtab;
            render();
          }
          break;
        }
        case 'logout': {
          S.screen = 'login';
          S.username = '';
          S.userId = null;
          S.modalData = {};
          S.drawerOpen = false;
          render();
          break;
        }

        // Modals
        case 'modal-new-employee': {
          S.modalData = { type: 'new-employee' };
          renderModal();
          break;
        }
        case 'modal-edit-employee': {
          var idE = e.target.closest('[data-id]').getAttribute('data-id');
          var emp = S.employees.find(function(e) { return e[0] === idE; });
          if (emp) {
            S.modalData = {
              type: 'edit-employee',
              id: emp[0],
              nombre: emp[1],
              telefono: emp[2],
              puesto: emp[3],
              turno: emp[4],
              pin: emp[5],
              salarioSemanal: emp[6],
              fechaIngreso: emp[7],
              email: emp[9],
              estatus: emp[8]
            };
            renderModal();
          }
          break;
        }
        case 'modal-edit-attendance': {
          var idA = e.target.closest('[data-id]').getAttribute('data-id');
          var att = S.attendance.find(function(a) { return a[0] === idA; });
          if (att) {
            S.modalData = {
              type: 'edit-attendance',
              id: att[0],
              entrada1: att[5],
              salida1: att[6],
              entrada2: att[7],
              salida2: att[8],
              tipoIncidencia: att[13],
              notas: att[14]
            };
            renderModal();
          }
          break;
        }
        case 'modal-calculate-payroll': {
          S.modalData = { type: 'calculate-payroll' };
          renderModal();
          break;
        }
        case 'modal-new-loan': {
          S.modalData = { type: 'new-loan' };
          renderModal();
          break;
        }
        case 'modal-pay-loan': {
          var idL = e.target.closest('[data-id]').getAttribute('data-id');
          var loan = S.loans.find(function(l) { return l[0] === idL; });
          if (loan) {
            S.modalData = {
              type: 'pay-loan',
              loanId: idL,
              empleadoId: loan[1],
              nombre: loan[2],
              saldoPendiente: loan[7]
            };
            renderModal();
          }
          break;
        }
        case 'modal-new-deduction': {
          S.modalData = { type: 'new-deduction' };
          renderModal();
          break;
        }

        // Modal close
        case 'modal-close': {
          closeModal();
          break;
        }

        // Modal save
        case 'modal-save': {
          saveModalData();
          break;
        }

        // Settings
        case 'settings-save': {
          S.sheetId = document.getElementById('settingsSheetId').value;
          S.apiKey = document.getElementById('settingsApiKey').value;
          S.scriptUrl = document.getElementById('settingsScriptUrl').value;
          localStorage.setItem('mz_sheetId', S.sheetId);
          localStorage.setItem('mz_apiKey', S.apiKey);
          localStorage.setItem('mz_scriptUrl', S.scriptUrl);
          toast('Configuración guardada');
          break;
        }
        case 'test-connection': {
          setWorking(true);
          sheetsRead('AdminUsers!A2:B50').then(function(data) {
            setWorking(false);
            if (data.length > 0) {
              S.adminUsers = data;
              toast('Conexión exitosa');
            } else {
              toast('Sin datos en AdminUsers', 'error');
            }
          }).catch(function() {
            setWorking(false);
            toast('Error de conexión', 'error');
          });
          break;
        }
        case 'init-system': {
          setWorking(true);
          scriptCall('initSystem', {}).then(function() {
            setWorking(false);
            toast('Sistema inicializado');
            loadInitialData();
          }).catch(function() {
            setWorking(false);
            toast('Error al inicializar', 'error');
          });
          break;
        }
        case 'clean-photos': {
          setWorking(true);
          scriptCall('limpiarFotos', {}).then(function() {
            setWorking(false);
            toast('Fotos limpias');
          }).catch(function() {
            setWorking(false);
            toast('Error al limpiar fotos', 'error');
          });
          break;
        }
        case 'payroll-close': {
          setWorking(true);
          scriptCall('cerrarNomina', {}).then(function() {
            setWorking(false);
            toast('Nómina cerrada');
            loadInitialData();
          }).catch(function() {
            setWorking(false);
            toast('Error al cerrar nómina', 'error');
          });
          break;
        }
        case 'generate-report': {
          toast('Reporte generado');
          break;
        }
      }
    });

        var title = S.modalData.type === 'new-employee' ? 'Nuevo empleado' : 'Editar empleado';
        content = '<div class="modal-header"><h2>' + title + '</h2><button class="modal-close" data-action="modal-close">×</button></div><div class="modal-body"><div class="form-group"><label>Nombre:</label><input type="text" id="empNombre" value="' + (S.modalData.nombre || '') + '"></div><div class="form-group"><label>Teléfono:</label><input type="text" id="empTelefono" value="' + (S.modalData.telefono || '') + '"></div><div class="form-group"><label>Email:</label><input type="email" id="empEmail" value="' + (S.modalData.email || '') + '"></div><div class="form-group"><label>Puesto:</label><select id="empPuesto"><option value="">Selecciona puesto</option><option value="Mesero/a" ' + (S.modalData.puesto === 'Mesero/a' ? 'selected' : '') + '>Mesero/a</option><option value="Cocinero/a" ' + (S.modalData.puesto === 'Cocinero/a' ? 'selected' : '') + '>Cocinero/a</option><option value="Ayudante de cocina" ' + (S.modalData.puesto === 'Ayudante de cocina' ? 'selected' : '') + '>Ayudante de cocina</option><option value="Barista" ' + (S.modalData.puesto === 'Barista' ? 'selected' : '') + '>Barista</option><option value="Cajero/a" ' + (S.modalData.puesto === 'Cajero/a' ? 'selected' : '') + '>Cajero/a</option><option value="Hostess" ' + (S.modalData.puesto === 'Hostess' ? 'selected' : '') + '>Hostess</option><option value="Lava loza" ' + (S.modalData.puesto === 'Lava loza' ? 'selected' : '') + '>Lava loza</option><option value="Repartidor" ' + (S.modalData.puesto === 'Repartidor' ? 'selected' : '') + '>Repartidor</option><option value="Gerente" ' + (S.modalData.puesto === 'Gerente' ? 'selected' : '') + '>Gerente</option><option value="Subgerente" ' + (S.modalData.puesto === 'Subgerente' ? 'selected' : '') + '>Subgerente</option></select></div><div class="form-group"><label>Turno:</label><select id="empTurno"><option value="">Selecciona turno</option><option value="Matutino" ' + (S.modalData.turno === 'Matutino' ? 'selected' : '') + '>Matutino</option><option value="Vespertino" ' + (S.modalData.turno === 'Vespertino' ? 'selected' : '') + '>Vespertino</option><option value="Quebrado" ' + (S.modalData.turno === 'Quebrado' ? 'selected' : '') + '>Quebrado</option></select></div><div class="form-group"><label>PIN (6 dígitos):</label><input type="text" id="empPin" value="' + (S.modalData.pin || '') + '" maxlength="6"></div><div class="form-group"><label>Salario semanal ($):</label><input type="number" id="empSalario" value="' + (S.modalData.salarioSemanal || '') + '"></div><div class="form-group"><label>Fecha de ingreso:</label><input type="date" id="empFecha" value="' + (S.modalData.fechaIngreso || '') + '"></div><div class="form-group"><label>Estatus:</label><select id="empEstatus"><option value="activo" ' + (S.modalData.estatus === 'activo' ? 'selected' : '') + '>Activo</option><option value="inactivo" ' + (S.modalData.estatus === 'inactivo' ? 'selected' : '') + '>Inactivo</option></select></div></div><div class="modal-footer"><button class="btn btn-secondary" data-action="modal-close">Cancelar</button><button class="btn" data-action="modal-save">Guardar</button></div>';
      } else if (S.modalData.type === 'edit-attendance') {
        content = '<div class="modal-header"><h2>Editar asistencia</h2><button class="modal-close" data-action="modal-close">×</button></div><div class="modal-body"><div class="form-group"><label>Entrada 1:</label><input type="time" id="attEntrada1" value="' + (S.modalData.entrada1 || '') + '"></div><div class="form-group"><label>Salida 1:</label><input type="time" id="attSalida1" value="' + (S.modalData.salida1 || '') + '"></div><div class="form-group"><label>Entrada 2:</label><input type="time" id="attEntrada2" value="' + (S.modalData.entrada2 || '') + '"></div><div class="form-group"><label>Salida 2:</label><input type="time" id="attSalida2" value="' + (S.modalData.salida2 || '') + '"></div><div class="form-group"><label>Tipo de incidencia:</label><select id="attTipoIncidencia"><option value="normal" ' + (S.modalData.tipoIncidencia === 'normal' ? 'selected' : '') + '>Normal</option><option value="retardo" ' + (S.modalData.tipoIncidencia === 'retardo' ? 'selected' : '') + '>Retardo</option><option value="falta_justificada" ' + (S.modalData.tipoIncidencia === 'falta_justificada' ? 'selected' : '') + '>Falta justificada</option><option value="falta_injustificada" ' + (S.modalData.tipoIncidencia === 'falta_injustificada' ? 'selected' : '') + '>Falta injustificada</option></select></div><div class="form-group"><label>Notas:</label><textarea id="attNotas" style="resize: vertical; min-height: 80px;">' + (S.modalData.notas || '') + '</textarea></div></div><div class="modal-footer"><button class="btn btn-secondary" data-action="modal-close">Cancelar</button><button class="btn" data-action="modal-save">Guardar</button></div>';
      } else if (S.modalData.type === 'calculate-payroll') {
        content = '<div class="modal-header"><h2>Calcular nómina</h2><button class="modal-close" data-action="modal-close">×</button></div><div class="modal-body"><p style="font-size: 13px; color: rgba(255,255,255,0.6); margin-bottom: 16px;">Se calcularán nóminas para el período actual basadas en asistencia y deducciones.</p></div><div class="modal-footer"><button class="btn btn-secondary" data-action="modal-close">Cancelar</button><button class="btn" data-action="modal-save">Calcular</button></div>';
      } else if (S.modalData.type === 'new-loan') {
        var empOptions = S.employees.filter(function(e) { return e[8] === 'activo'; }).map(function(e) {
          return '<option value="' + e[0] + '">' + e[1] + '</option>';
        }).join('');
        content = '<div class="modal-header"><h2>Nuevo préstamo</h2><button class="modal-close" data-action="modal-close">×</button></div><div class="modal-body"><div class="form-group"><label>Empleado:</label><select id="loanEmpleado"><option value="">Selecciona empleado</option>' + empOptions + '</select></div><div class="form-group"><label>Tipo:</label><select id="loanTipo"><option value="Préstamo">Préstamo</option><option value="Adelanto">Adelanto</option></select></div><div class="form-group"><label>Monto ($):</label><input type="number" id="loanMonto" min="0"></div><div class="form-group"><label>Parcialidades:</label><input type="number" id="loanParcialidades" min="1" value="1"></div></div><div class="modal-footer"><button class="btn btn-secondary" data-action="modal-close">Cancelar</button><button class="btn" data-action="modal-save">Crear</button></div>';
      } else if (S.modalData.type === 'pay-loan') {
        content = '<div class="modal-header"><h2>Abonar a préstamo</h2><button class="modal-close" data-action="modal-close">×</button></div><div class="modal-body"><p style="font-size: 13px; color: rgba(255,255,255,0.6); margin-bottom: 16px;">' + S.modalData.nombre + ' - Saldo pendiente: $' + parseFloat(S.modalData.saldoPendiente || 0).toFixed(2) + '</p><div class="form-group"><label>Monto a abonar ($):</label><input type="number" id="payAmount" min="0" max="' + (S.modalData.saldoPendiente || 0) + '"></div></div><div class="modal-footer"><button class="btn btn-secondary" data-action="modal-close">Cancelar</button><button class="btn" data-action="modal-save">Abonar</button></div>';
      } else if (S.modalData.type === 'new-deduction') {
        var dedEmpOptions = S.employees.filter(function(e) { return e[8] === 'activo'; }).map(function(e) {
          return '<option value="' + e[0] + '">' + e[1] + '</option>';
        }).join('');
        content = '<div class="modal-header"><h2>Nueva deducción</h2><button class="modal-close" data-action="modal-close">×</button></div><div class="modal-body"><div class="form-group"><label>Empleado:</label><select id="dedEmpleado"><option value="">Selecciona empleado</option>' + dedEmpOptions + '</select></div><div class="form-group"><label>Tipo:</label><select id="dedTipo"><option value="Comida">Comida</option><option value="Otras">Otras</option></select></div><div class="form-group"><label>Monto ($):</label><input type="number" id="dedMonto" min="0"></div><div class="form-group"><label>Descripción:</label><textarea id="dedDescripcion" style="resize: vertical; min-height: 60px;"></textarea></div></div><div class="modal-footer"><button class="btn btn-secondary" data-action="modal-close">Cancelar</button><button class="btn" data-action="modal-save">Crear</button></div>';
      }

      modal.innerHTML = content;
      modal.classList.add('open');
      overlay.classList.add('open');
    }

    function closeModal() {
      document.getElementById('modal').classList.remove('open');
      document.getElementById('modalOverlay').classList.remove('open');
      S.modalData = {};
    }

    function saveModalData() {
      var type = S.modalData.type;

      if (type === 'new-employee') {
        var data = [
          Math.random().toString(36).substr(2, 9),
          document.getElementById('empNombre').value,
          document.getElementById('empTelefono').value,
          document.getElementById('empPuesto').value,
          document.getElementById('empTurno').value,
          document.getElementById('empPin').value,
          document.getElementById('empSalario').value,
          document.getElementById('empFecha').value,
          document.getElementById('empEstatus').value,
          document.getElementById('empEmail').value
        ];
        queueAction('appendEmpleado', { data: data });
        closeModal();
        toast('Empleado agregado (en cola)');
      } else if (type === 'edit-employee') {
        queueAction('updateEmpleado', {
          id: S.modalData.id,
          nombre: document.getElementById('empNombre').value,
          telefono: document.getElementById('empTelefono').value,
          puesto: document.getElementById('empPuesto').value,
          turno: document.getElementById('empTurno').value,
          pin: document.getElementById('empPin').value,
          salarioSemanal: document.getElementById('empSalario').value,
          fechaIngreso: document.getElementById('empFecha').value,
          email: document.getElementById('empEmail').value,
          estatus: document.getElementById('empEstatus').value
        });
        closeModal();
        toast('Empleado actualizado (en cola)');
      } else if (type === 'edit-attendance') {
        queueAction('updateAsistencia', {
          id: S.modalData.id,
          entrada1: document.getElementById('attEntrada1').value,
          salida1: document.getElementById('attSalida1').value,
          entrada2: document.getElementById('attEntrada2').value,
          salida2: document.getElementById('attSalida2').value,
          tipoIncidencia: document.getElementById('attTipoIncidencia').value,
          notas: document.getElementById('attNotas').value
        });
        closeModal();
        toast('Asistencia actualizada (en cola)');
      } else if (type === 'calculate-payroll') {
        setWorking(true);
        var today = new Date().toISOString().split('T')[0];
        scriptCall('calcularNomina', {
          periodoInicio: today,
          periodoFin: today
        }).then(function() {
          setWorking(false);
          closeModal();
          toast('Nómina calculada');
          loadInitialData();
        }).catch(function() {
          setWorking(false);
          toast('Error al calcular nómina', 'error');
        });
      } else if (type === 'new-loan') {
        queueAction('appendPrestamo', {
          empleadoId: document.getElementById('loanEmpleado').value,
          tipo: document.getElementById('loanTipo').value,
          montoTotal: document.getElementById('loanMonto').value,
          parcialidades: document.getElementById('loanParcialidades').value
        });
        closeModal();
        toast('Préstamo creado (en cola)');
      } else if (type === 'pay-loan') {
        queueAction('abonarPrestamo', {
          loanId: S.modalData.loanId,
          monto: document.getElementById('payAmount').value
        });
        closeModal();
        toast('Abono registrado (en cola)');
      } else if (type === 'new-deduction') {
        queueAction('appendDeduccion', {
          empleadoId: document.getElementById('dedEmpleado').value,
          tipo: document.getElementById('dedTipo').value,
          monto: document.getElementById('dedMonto').value,
          descripcion: document.getElementById('dedDescripcion').value
        });
        closeModal();
        toast('Deducción creada (en cola)');
      }
    }

    // Load initial data
    function loadInitialData() {
      setWorking(true);
      Promise.all([
        sheetsRead('Empleados!A2:J500'),
        sheetsRead('Asistencia!A2:T500'),
        sheetsRead('Prestamos!A2:L50'),
        sheetsRead('Deducciones!A2:G500'),
        sheetsRead('Nomina!A2:U500')
      ]).then(function(results) {
        S.employees = results[0];
        S.attendance = results[1];
        S.loans = results[2];
        S.deductions = results[3];
        S.payrolls = results[4];
        setWorking(false);
        render();
      }).catch(function() {
        setWorking(false);
        toast('Error al cargar datos', 'error');
      });
    }

    document.getElementById('drawerOverlay').addEventListener('click', function() {
      S.drawerOpen = false;
      document.getElementById('drawer').classList.remove('open');
      document.getElementById('drawerOverlay').classList.remove('open');
    });

    document.getElementById('modalOverlay').addEventListener('click', closeModal);

    // Initial render
    render();
  </script>
</body>
</html>
